{% set version = "0.12.0" %}

package:
  name: spyndex
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/s/spyndex/spyndex-{{ version }}.tar.gz
  sha256: c7b2acef1da6f749392a10b4f0215edadf787cdae03b85844f6584c053404fa0

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python >=3.8
    - setuptools >=61.0
    - wheel
    - pip
  run:
    - python >=3.8
    - python-box >=6.0
    - requests

test:
  imports:
    - spyndex
  commands:
    - pip check
  requires:
    - pip
    - python

about:
  home: https://github.com/awesome-spectral-indices/spyndex
  summary: Awesome Spectral Indices in Python
  license: MIT
  license_file: LICENSE
  doc_url: https://spyndex.readthedocs.io/
  dev_url: https://github.com//awesome-spectral-indices/spyndex

extra:
  recipe-maintainers:
    - davemlz
